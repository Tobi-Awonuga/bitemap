services:
  # API (Node.js/Express)
  - type: web
    name: bitemap-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: bitemap-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false        # Set to your production web URL
      - key: RUN_MIGRATIONS
        value: true

  # Web (static site — build output)
  - type: web
    name: bitemap-web
    runtime: static
    buildCommand: npm run build:web
    staticPublishPath: ./apps/web/dist
    plan: starter
    envVars:
      - key: VITE_API_URL
        sync: false        # Set to your API URL, e.g. https://bitemap-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: bitemap-db
    plan: starter
    databaseName: bitemap
